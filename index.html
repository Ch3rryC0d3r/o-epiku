<!DOCTYPE html>
<html lang="en">
<head>
<base href="./">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>o epiku</title>

<style>
body {
    margin: 0;
    background: #f5f5f5;
    color: #111;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card-scene {
    width: 80%;
    max-width: 650px;
    height: 460px;
    perspective: 1000px;
}

.card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.6s ease;
}

.card.flipped {
    transform: rotateY(180deg);
}

.card-face {
    position: absolute;
	backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    transform: translateZ(0);
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: white;
    border-radius: 18px;
    padding: 25px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    text-align: center;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
}

.card:not(.flipped) .card-back-face {
    visibility: hidden;
}

.card.flipped .card-back-face {
    visibility: visible;
}

.card-back-face {
    transform: rotateY(180deg);
}

.word {
    font-size: 44px;
    font-weight: bold;
}

.img-box {
    height: 220px;
    display: flex;
    justify-content: center;
    align-items: center;
}

img {
    max-height: 200px;
    max-width: 100%;
    object-fit: contain;
}

.back-def {
    font-size: 28px;
    font-weight: 700;
    text-align: center;
}

button {
    margin: 5px;
    padding: 10px 14px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.15s ease;
}

.flip-btn {
    padding: 14px 22px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    font-size: 18px;
    font-weight: 700;
    transition: 0.2s ease;
}

.start-state {
    background: #2ecc71;
    color: white;
}

.start-state:hover {
    background: #1e9e55;
}

.stop-state {
    background: #e74c3c;
    color: white;
}

.stop-state:hover {
    background: #c0392b;
}

.flip-btn:hover {
    background: #666;
}

.wrong-btn {
    background: #ff4d4d;
    color: white;
}

.wrong-btn:hover {
    background: #e60000;
}

.right-btn {
    background: #2ecc71;
    color: white;
}

.right-btn:hover {
    background: #1e9e55;
}

.top-left {
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 9999;
}

#resultPopup {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.popupBox {
    background: white;
    padding: 30px;
    border-radius: 18px;
    width: 300px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

.gradeBig {
    font-size: 64px;
    font-weight: 800;
    margin-bottom: 10px;
}

.popupStats {
    font-size: 16px;
    line-height: 1.5;
}

.bad .card-back-face {
    animation: shakeRed 0.4s ease;
}

@keyframes shakeRed {
    0%   { transform: rotateY(180deg) translateX(0);    background: white; }
    20%  { transform: rotateY(180deg) translateX(-10px); background: #ffcccc; }
    40%  { transform: rotateY(180deg) translateX(10px); }
    60%  { transform: rotateY(180deg) translateX(-6px); }
    80%  { transform: rotateY(180deg) translateX(6px); }
    100% { transform: rotateY(180deg) translateX(0);    background: white; }
}

.good .card-back-face {
    animation: popGreen 0.4s ease;
}

@keyframes popGreen {
    0%   { transform: rotateY(180deg) translateY(0);     background: white; }
    30%  { transform: rotateY(180deg) translateY(-10px); background: #ccffdd; }
    60%  { transform: rotateY(180deg) translateY(5px); }
    100% { transform: rotateY(180deg) translateY(0);     background: white; }
}
</style>
</head>

<body>

<button id="startBtn" class="flip-btn top-left start-state" onclick="toggleSession()">start</button>

<div class="card-scene">
    <div class="card" id="card">

        <!-- FRONT: toki pona word + image -->
        <div class="card-face card-front-face">
            <div class="word" id="front">loading...</div>
            <div class="img-box">
                <img id="imgFront" style="display:none">
            </div>
            <div style="display:flex; flex-direction:column; gap:10px; align-items:center;">
                <button id="flipBtn" class="flip-btn" onclick="flip()" style="display:none;">flip</button>
            </div>
        </div>

        <!-- BACK: english definition + image -->
        <div class="card-face card-back-face">
            <div class="back-def" id="back-def"></div>
            <div class="img-box">
                <img id="imgBack" style="display:none">
            </div>
            <div id="gradeButtons" style="display:none; display:flex; gap:10px;">
                <button class="wrong-btn" onclick="grade(false)">wrong</button>
                <button class="right-btn" onclick="grade(true)">right</button>
            </div>
        </div>

    </div>
</div>

<!-- POPUP -->
<div id="resultPopup" style="display:none;">
    <div class="popupBox">
        <div class="gradeBig" id="finalGrade">A</div>
        <div class="popupStats">
            Accuracy: <span id="finalAcc">0%</span><br>
            Right: <span id="finalRight">0</span> |
            Wrong: <span id="finalWrong">0</span> |
            Total: <span id="finalTotal">0</span>
        </div>
        <button onclick="closePopup()" class="flip-btn" style="margin-top:15px;">close</button>
    </div>
</div>

{f:"sitelen", b:"write, draw", interval: 0, ease: 2.5, due: 0},
{f:"sona", b:"know", interval: 0, ease: 2.5, due: 0},
{f:"soweli", b:"animal", interval: 0, ease: 2.5, due: 0},

{f:"supa", b:"surface", interval: 0, ease: 2.5, due: 0},

{f:"tan", b:"from, because", interval: 0, ease: 2.5, due: 0},
{f:"tawa", b:"move, to", interval: 0, ease: 2.5, due: 0},
{f:"telo", b:"water, liquid", interval: 0, ease: 2.5, due: 0},
{f:"tenpo", b:"time", interval: 0, ease: 2.5, due: 0},
{f:"toki", b:"speak, language", interval: 0, ease: 2.5, due: 0},
{f:"tomo", b:"house, building", interval: 0, ease: 2.5, due: 0},
{f:"tu", b:"two, divide", interval: 0, ease: 2.5, due: 0},
{f:"unpa", b:"sex", interval: 0, ease: 2.5, due: 0},
{f:"uta", b:"mouth", interval: 0, ease: 2.5, due: 0},
{f:"utala", b:"fight", interval: 0, ease: 2.5, due: 0},
{f:"walo", b:"white", interval: 0, ease: 2.5, due: 0},
{f:"wan", b:"one, unite", interval: 0, ease: 2.5, due: 0},
{f:"waso", b:"bird", interval: 0, ease: 2.5, due: 0},
{f:"wawa", b:"strong, energy", interval: 0, ease: 2.5, due: 0},
{f:"weka", b:"away, remove", interval: 0, ease: 2.5, due: 0},
{f:"wile", b:"want, need"}
];

/* =========================
   STATE
   ========================= */

let current = null;
let session = false;
let right = 0;
let wrong = 0;
let total = 0;

/* =========================
   SESSION
   ========================= */

function toggleSession(){
    session = !session;
    let btn = document.getElementById("startBtn");
	if (session){
		btn.innerText = "stop";
		btn.classList.remove("start-state");
		btn.classList.add("stop-state");

		document.getElementById("flipBtn").style.display = "block";

		resetStats();
		pick();
	} else {
		btn.innerText = "start";
		btn.classList.remove("stop-state");
		btn.classList.add("start-state");

		document.getElementById("flipBtn").style.display = "none";

		clearCard();
		showPopup();
		confetti();
	}
}

function showPopup(){
    let acc = total === 0 ? 0 : Math.round((right / total) * 100);
    let grade = "-";
    if (acc >= 95) grade = "A+";
    else if (acc >= 85) grade = "A";
    else if (acc >= 70) grade = "B";
    else if (acc > 0) grade = "C";

    document.getElementById("finalGrade").innerText = grade;
    document.getElementById("finalAcc").innerText = acc + "%";
    document.getElementById("finalRight").innerText = right;
    document.getElementById("finalWrong").innerText = wrong;
    document.getElementById("finalTotal").innerText = total;
    document.getElementById("resultPopup").style.display = "flex";
}

function closePopup(){
    document.getElementById("resultPopup").style.display = "none";
}

function resetStats(){
    right = 0;
    wrong = 0;
    total = 0;

    const now = Date.now();

    for (let c of deck){
        c.interval = 0;
        c.ease = 2.5;
        c.due = now; // everything starts due immediately
    }
}

/* =========================
   CARDS
   ========================= */

function pick(){
    if (!session) {
        clearCard();
        return;
    }

    const now = Date.now();

    let dueCards = deck.filter(c => c.due <= now);

    if (dueCards.length === 0) {
        // nothing due -> force next soonest card
        dueCards = [...deck].sort((a,b) => a.due - b.due).slice(0, 1);
    }

    current = dueCards[Math.floor(Math.random() * dueCards.length)];
    render();
}

function render(){
    if (!current) return;

    const card = document.getElementById("card");
    document.getElementById("back-def").innerText = "";
	document.getElementById("imgBack").style.display = "none";
	document.getElementById("gradeButtons").style.display = "none";
	card.classList.remove("flipped", "bad", "good");

    document.getElementById("front").innerText = current.f;

    const imgFront = document.getElementById("imgFront");
    imgFront.src = "./index_files/" + current.f + ".png";
    imgFront.style.display = "block";

    document.getElementById("back-def").innerText = current.b;

    const imgBack = document.getElementById("imgBack");
    imgBack.src = "./index_files/" + current.f + ".png";
    imgBack.style.display = "block";

    document.getElementById("gradeButtons").style.display = "none";
}

function flip(){
    if (!current) return;
    document.getElementById("card").classList.add("flipped");
    document.getElementById("gradeButtons").style.display = "flex";
}

/* =========================
   GRADING
   ========================= */

function grade(correct){
    if (!current || !session) return;

    const card = document.getElementById("card");

    const now = Date.now();

    if (correct){
        right++;

        current.ease = Math.min(current.ease + 0.1, 3.0);
        current.interval = current.interval === 0 ? 1 : Math.round(current.interval * current.ease);

        current.due = now + current.interval * 60 * 1000; // minutes for now (debug-friendly)

        card.classList.remove("good");
        void card.offsetWidth;
        card.classList.add("good");

    } else {
        wrong++;

        current.ease = Math.max(current.ease - 0.2, 1.3);
        current.interval = 0;

        current.due = now + 30 * 1000; // repeat soon (30 sec punishment loop)

        card.classList.remove("bad");
        void card.offsetWidth;
        card.classList.add("bad");
    }

    total++;

    setTimeout(() => pick(), 420);
}

/* =========================
   CONTROLS
   ========================= */

document.addEventListener("keydown", e => {
    if (e.code === "Space") flip();
    if (e.code === "ArrowLeft") grade(false);
    if (e.code === "ArrowRight") grade(true);
});

pick();

function confetti(){
    for(let i = 0; i < 30; i++){
        let c = document.createElement("div");
        c.style.position = "fixed";
        c.style.left = Math.random() * 100 + "vw";
        c.style.top = "-10px";
        c.style.width = "6px";
        c.style.height = "6px";
        c.style.background = ["#2ecc71","#f1c40f","#3498db","#e74c3c"][Math.floor(Math.random() * 4)];
        c.style.zIndex = 99999;
        c.style.borderRadius = "50%";
        document.body.appendChild(c);

        let fall = setInterval(() => {
            let top = parseFloat(c.style.top);
            c.style.top = top + 5 + "px";
            if (top > window.innerHeight){
                clearInterval(fall);
                c.remove();
            }
        }, 16);
    }
}

function clearCard(){
    const card = document.getElementById("card");
    card.classList.remove("flipped", "bad", "good");
    document.getElementById("front").innerText = "";
    document.getElementById("back-def").innerText = "";
    document.getElementById("imgFront").style.display = "none";
    document.getElementById("imgBack").style.display = "none";
    document.getElementById("gradeButtons").style.display = "none";
}

</script>

</body>
</html>
